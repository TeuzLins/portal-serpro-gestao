version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: serpro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: serpro
      POSTGRES_USER: serpro
      POSTGRES_PASSWORD: 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serpro"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: serpro-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://serpro:@db:5432/serpro
      PORT: 3000
      JWT_SECRET: 
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./nginx
    container_name: serpro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
